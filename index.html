<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEKERDZI — Modern Tbilisi Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F5F3EF] min-h-screen">

  <div id="splash" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#0D0D0D]">
    <div class="splash-logo mb-6">
      <div class="w-28 h-28 rounded-2xl bg-[#1A1A1A] flex items-center justify-center border border-[#2A2A2A] shadow-2xl mb-6 mx-auto">
        <span class="text-[#C9A84C] text-3xl font-display font-bold">Z</span>
      </div>
      <h1 class="text-white text-4xl font-display font-black tracking-widest text-center">ZEKERDZI</h1>
      <p class="text-[#C9A84C] text-xs tracking-[.35em] text-center mt-1 uppercase">Modern Tbilisi Kitchen</p>
    </div>
    <div class="w-64 mt-12">
      <div class="h-1 bg-[#222] rounded-full overflow-hidden">
        <div id="splash-bar" class="h-full bg-[#1D6FE8] rounded-full" style="width:0%;transition:width .05s linear"></div>
      </div>
      <p id="splash-pct" class="text-[#1D6FE8] text-xs text-right mt-1">0%</p>
    </div>
  </div>

  <div id="app" class="hidden max-w-sm mx-auto min-h-screen flex flex-col relative pb-20">

    <div id="view-home" class="view active">
      <div class="sticky top-0 z-10 bg-[#F5F3EF] px-5 pt-6 pb-3">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs text-[#888] uppercase tracking-widest">Zekerdzi · Tbilisi</p>
            <h2 class="text-2xl font-display font-bold text-[#0D0D0D]">Popular Dishes</h2>
          </div>
        </div>
      </div>
      <div class="mx-5 mt-2 rounded-2xl overflow-hidden relative h-44 bg-[#1a1a1a] shadow-lg">
        <div class="absolute inset-0 bg-gradient-to-tr from-[#0D0D0D] via-transparent to-transparent z-10"></div>
        <div class="hero-bg absolute inset-0 opacity-60"></div>
        <div class="absolute bottom-4 left-4 z-20">
          <span class="bg-[#C9A84C] text-[#0D0D0D] text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-full">Chef's Selection</span>
          <h3 class="text-white text-2xl font-display font-bold mt-1">Weekly Mix</h3>
        </div>
      </div>
      <div id="dishes-grid" class="grid grid-cols-2 gap-3 px-5 mt-5 pb-4"></div>
    </div>

    <div id="view-menu" class="view hidden">
      <div class="sticky top-0 z-10 bg-[#F5F3EF] px-5 pt-6 pb-3">
        <div class="flex items-center justify-between">
          <h2 class="text-2xl font-display font-bold text-[#0D0D0D]">Zekerdzi Menu</h2>
          <div class="relative">
            <span id="menu-cart-badge" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-[#1D6FE8] text-white text-[10px] font-bold rounded-full flex items-center justify-center z-10">0</span>
            <button onclick="showView('cart')" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm">
               <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            </button>
          </div>
        </div>
        <div class="mt-4 flex items-center gap-2 bg-white rounded-xl px-3 py-2 shadow-sm">
          <input id="menu-search" type="text" placeholder="Search..." class="flex-1 text-sm bg-transparent outline-none" />
        </div>
        <div class="cat-pills-container flex gap-2 mt-3 overflow-x-auto no-scrollbar"></div>
      </div>
      <div id="menu-list" class="px-5 pb-4 space-y-3"></div>
    </div>

    <div id="view-item-detail" class="view hidden bg-white min-h-screen">
      <div class="relative w-full h-80 overflow-hidden">
        <div id="detail-img" class="w-full h-full flex items-center justify-center text-8xl bg-[#0D0D0D]"></div>
        <button onclick="goBack()" class="absolute top-6 left-4 w-10 h-10 flex items-center justify-center bg-white/90 backdrop-blur-md rounded-full shadow-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
      </div>
      <div class="relative -mt-6 bg-[#F5F3EF] rounded-t-3xl px-5 pt-8 pb-32">
        <div class="flex justify-between items-start mb-2">
          <div>
            <h1 id="detail-name" class="text-2xl font-display font-bold"></h1>
            <p id="detail-ka" class="text-[#888] italic text-sm"></p>
          </div>
          <div id="detail-price" class="text-xl font-bold text-[#1D6FE8]"></div>
        </div>
        <p id="detail-desc" class="text-[#555] text-sm mt-4 mb-6 leading-relaxed"></p>

        <div id="size-selection" class="mb-8 hidden">
          <h2 class="text-lg font-display font-bold mb-4">აირჩიეთ ზომა</h2>
          <div id="size-options-container" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="extras-selection" class="mb-8 hidden">
          <h2 class="text-lg font-display font-bold mb-4">დანამატები</h2>
          <div id="extras-options-container" class="space-y-3 bg-white rounded-2xl p-2 shadow-sm"></div>
        </div>
      </div>
      <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-[#F0F0F0] px-5 py-4 z-50">
        <button id="detail-add-btn" class="w-full max-w-sm mx-auto bg-[#1D6FE8] text-white font-bold h-14 rounded-2xl flex items-center justify-between px-6 shadow-lg">
          <span>Add to Order</span>
          <span id="detail-btn-price"></span>
        </button>
      </div>
    </div>

    <div id="view-cart" class="view hidden">
      <div class="sticky top-0 z-10 bg-[#F5F3EF] px-5 pt-6 pb-3 flex items-center justify-between">
        <h2 class="text-xl font-display font-bold">Your Cart</h2>
      </div>
      <div id="cart-items" class="px-5 mt-4 space-y-3"></div>
      <div class="mx-5 mt-5 bg-white rounded-2xl px-5 py-4 shadow-sm">
        <div class="space-y-2 text-sm">
          <div class="flex justify-between text-[#555]"><span>Subtotal</span><span id="summary-subtotal">₾0.00</span></div>
          <div class="flex justify-between font-bold text-base pt-3 border-t border-dashed">
            <span>Total</span><span id="summary-total" class="text-[#1D6FE8]">₾0.00</span>
          </div>
        </div>
      </div>
      <div class="px-5 mt-6"><button class="w-full bg-[#1D6FE8] text-white rounded-2xl py-4 font-semibold shadow-lg">Checkout</button></div>
    </div>

    <div id="view-orders" class="view hidden">
      <div class="px-5 pt-6"><h2 class="text-2xl font-display font-bold">Orders</h2></div>
      <div class="flex flex-col items-center justify-center mt-20 text-[#AAA]">
        <div class="text-5xl mb-4">📦</div>
        <p>No active orders</p>
      </div>
    </div>

    <div id="view-profile" class="view hidden">
      <div class="px-5 pt-6"><h2 class="text-2xl font-display font-bold">Profile</h2></div>
      <div class="px-5 mt-8">
        <div class="bg-white p-6 rounded-3xl shadow-sm flex items-center gap-4">
          <div class="w-16 h-16 bg-[#F5F3EF] rounded-2xl flex items-center justify-center text-2xl">👤</div>
          <div><h3 class="font-bold text-lg">Guest User</h3><p class="text-sm text-[#888]">Welcome back!</p></div>
        </div>
      </div>
    </div>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-white border-t border-[#F0F0F0] flex z-20">
      <button data-nav="home" class="nav-btn active-nav flex-1 py-3 flex flex-col items-center gap-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2"/></svg>
        <span class="text-[10px] font-bold">HOME</span>
      </button>
      <button data-nav="menu" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253" stroke-width="2"/></svg>
        <span class="text-[10px] font-bold">MENU</span>
      </button>
      <button data-nav="cart" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1">
        <div class="relative">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg>
          <span id="nav-cart-badge" class="hidden absolute -top-1 -right-1 w-3.5 h-3.5 bg-[#1D6FE8] text-white text-[8px] font-bold rounded-full flex items-center justify-center">0</span>
        </div>
        <span class="text-[10px] font-bold">CART</span>
      </button>
      <button data-nav="orders" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-width="2"/></svg>
        <span class="text-[10px] font-bold">ORDERS</span>
      </button>
      <button data-nav="profile" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
        <span class="text-[10px] font-bold">PROFILE</span>
      </button>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>
